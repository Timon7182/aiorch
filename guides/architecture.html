<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagesticAI — Task Architecture</title>
<style>
  :root {
    --bg: #0f172a;
    --ink: #e5e7eb;
    --muted: #94a3b8;
    --line: #1f2937;
    --phase: #60a5fa;
    --phase-fill: #1e3a8a;
    --decision: #fbbf24;
    --decision-fill: #78350f;
    --human: #a78bfa;
    --human-fill: #4c1d95;
    --loop: #f87171;
    --done: #34d399;
    --done-fill: #064e3b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 16px 28px 14px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: #f1f5f9;
  }
  header .legend {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 22px;
    font-size: 12px;
    color: var(--muted);
  }
  .chip { display: inline-flex; align-items: center; gap: 7px; }
  .chip .sw { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid; }
  .chip .sw.phase    { background: var(--phase-fill);    border-color: var(--phase); }
  .chip .sw.cond     { background: transparent;          border-color: var(--phase); border-style: dashed; }
  .chip .sw.decision { background: var(--decision-fill); border-color: var(--decision); transform: rotate(45deg); }
  .chip .sw.human    { background: var(--human-fill);    border-color: var(--human); }
  .chip .sw.loop     { background: transparent;          border-color: var(--loop); border-radius: 50%; }
  .chip .sw.done     { background: var(--done-fill);     border-color: var(--done); border-radius: 50%; }

  main {
    padding: 18px 16px 32px;
    display: flex;
    justify-content: center;
  }
  svg.flow {
    width: 100%;
    max-width: 1280px;
    height: auto;
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  .node { animation: fadeIn 0.55s ease-out both; transform-box: fill-box; }
  .n1  { animation-delay: 0.00s; }
  .n2  { animation-delay: 0.08s; }
  .n3  { animation-delay: 0.16s; }
  .n4  { animation-delay: 0.24s; }
  .n5  { animation-delay: 0.32s; }
  .n6  { animation-delay: 0.40s; }
  .n7  { animation-delay: 0.48s; }
  .n8  { animation-delay: 0.56s; }
  .n9  { animation-delay: 0.64s; }
  .n10 { animation-delay: 0.72s; }
  .pulse { animation: pulse 2.4s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .node, .pulse { animation: none; }
    .flowdash { stroke-dasharray: none !important; }
    .flowdash animate { display: none; }
  }
</style>
</head>

<body>

<header>
  <h1>MagesticAI — End-to-End Task Architecture</h1>
  <div class="legend">
    <span class="chip"><span class="sw phase"></span> Phase</span>
    <span class="chip"><span class="sw cond"></span> Conditional</span>
    <span class="chip"><span class="sw decision"></span> Decision</span>
    <span class="chip"><span class="sw human"></span> Human gate</span>
    <span class="chip"><span class="sw loop"></span> Loop / retry</span>
    <span class="chip"><span class="sw done"></span> Done</span>
  </div>
</header>

<main>
  <!-- Snake layout: top row L→R, bottom row R→L, fits 16:9-ish viewport -->
  <svg class="flow" viewBox="0 0 1280 620" xmlns="http://www.w3.org/2000/svg"
       font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
      </marker>
      <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
      </marker>
      <marker id="arrowHuman" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
      </marker>
    </defs>

    <!-- =============== TOP ROW FLOW LINES (L→R) =============== -->
    <g fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" class="flowdash">
      <line x1="180" y1="105" x2="226" y2="105"/>
      <line x1="378" y1="105" x2="426" y2="105"/>
      <line x1="800" y1="105" x2="846" y2="105"/>
      <line x1="998" y1="105" x2="1046" y2="105"/>
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.4s" repeatCount="indefinite"/>
    </g>
    <!-- arrow heads (static) -->
    <g fill="#94a3b8">
      <polygon points="220,101 220,109 228,105"/>
      <polygon points="420,101 420,109 428,105"/>
      <polygon points="840,101 840,109 848,105"/>
      <polygon points="1040,101 1040,109 1048,105"/>
    </g>

    <!-- =============== VERTICAL JUMP (Top → Bottom row) =============== -->
    <path d="M 1160 156 L 1160 380" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" class="flowdash">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <polygon points="1156,376 1164,376 1160,384" fill="#94a3b8"/>

    <!-- =============== BOTTOM ROW FLOW LINES (R→L) =============== -->
    <g fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" class="flowdash">
      <line x1="1046" y1="450" x2="998"  y2="450"/>
      <line x1="846"  y1="450" x2="798"  y2="450"/>
      <line x1="640"  y1="450" x2="594"  y2="450"/>
      <line x1="416"  y1="450" x2="370"  y2="450"/>
      <line x1="220"  y1="450" x2="172"  y2="450"/>
      <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1.4s" repeatCount="indefinite"/>
    </g>
    <g fill="#94a3b8">
      <polygon points="1004,446 1004,454 996,450"/>
      <polygon points="804,446 804,454 796,450"/>
      <polygon points="600,446 600,454 592,450"/>
      <polygon points="376,446 376,454 368,450"/>
      <polygon points="178,446 178,454 170,450"/>
    </g>

    <!-- =============== 1. TASK INPUT =============== -->
    <g class="node n1">
      <rect x="40" y="76" width="140" height="58" rx="14"
            fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.6"/>
      <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">1. Task input</text>
      <text x="110" y="118" text-anchor="middle" font-size="10.5" fill="#bfdbfe">CLI · Web UI</text>
    </g>

    <!-- =============== 2. COMPLEXITY (decision) =============== -->
    <g class="node n2">
      <polygon points="302,70 378,107 302,144 226,107"
               fill="#78350f" stroke="#fbbf24" stroke-width="1.8"/>
      <text x="302" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#fef3c7">2. Complexity</text>
      <text x="302" y="120" text-anchor="middle" font-size="10" fill="#fde68a">Lv 0–4</text>
    </g>

    <!-- =============== 3. SPEC PIPELINE (wide grouped) =============== -->
    <g class="node n3">
      <rect x="426" y="48" width="374" height="116" rx="10"
            fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.6"/>
      <text x="613" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">3. Spec pipeline  <tspan font-size="10" fill="#bfdbfe">— 3–9 phases</tspan></text>

      <g font-size="10" fill="#e0e7ff">
        <rect x="440" y="78" width="74" height="20" rx="10" fill="#3b4b8a"/>
        <text x="477" y="92" text-anchor="middle">discovery</text>

        <rect x="518" y="78" width="86" height="20" rx="10" fill="#3b4b8a"/>
        <text x="561" y="92" text-anchor="middle">requirements</text>

        <rect x="608" y="78" width="62" height="20" rx="10" fill="none" stroke="#60a5fa" stroke-dasharray="3,2"/>
        <text x="639" y="92" text-anchor="middle">research</text>

        <rect x="674" y="78" width="112" height="20" rx="10" fill="none" stroke="#60a5fa" stroke-dasharray="3,2"/>
        <text x="730" y="92" text-anchor="middle">architecture · Lv 3+</text>

        <rect x="440" y="103" width="62" height="20" rx="10" fill="#3b4b8a"/>
        <text x="471" y="117" text-anchor="middle">context</text>

        <rect x="506" y="103" width="62" height="20" rx="10" fill="#3b4b8a"/>
        <text x="537" y="117" text-anchor="middle">spec.md</text>

        <rect x="572" y="103" width="90" height="20" rx="10" fill="none" stroke="#60a5fa" stroke-dasharray="3,2"/>
        <text x="617" y="117" text-anchor="middle">self-critique</text>

        <rect x="666" y="103" width="66" height="20" rx="10" fill="#3b4b8a"/>
        <text x="699" y="117" text-anchor="middle">planning</text>

        <rect x="736" y="103" width="50" height="20" rx="10" fill="#3b4b8a"/>
        <text x="761" y="117" text-anchor="middle">validate</text>

        <!-- validation auto-fix mini-arc -->
        <path d="M 786 113 C 802 105, 802 121, 786 121" fill="none" stroke="#f87171" stroke-width="1.3"
              stroke-dasharray="4 2">
          <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite"/>
        </path>
      </g>

      <text x="613" y="148" text-anchor="middle" font-size="10.5" fill="#cbd5e1">→ implementation_plan.json</text>
    </g>

    <!-- =============== 4. PLAN REVIEW (human gate, optional) =============== -->
    <g class="node n4 pulse">
      <polygon points="924,52 998,105 924,158 846,105"
               fill="#4c1d95" stroke="#a78bfa" stroke-width="1.8"/>
      <text x="924" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#ede9fe">4. Plan review?</text>
      <text x="924" y="115" text-anchor="middle" font-size="10" fill="#ddd6fe">optional</text>
    </g>

    <!-- =============== 5. WORKTREE =============== -->
    <g class="node n5">
      <rect x="1046" y="76" width="140" height="58" rx="14"
            fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.6"/>
      <text x="1116" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">5. Worktree</text>
      <text x="1116" y="118" text-anchor="middle" font-size="10" fill="#bfdbfe">isolated branch</text>
    </g>

    <!-- =============== 6. CODER LOOP (bottom row, right) =============== -->
    <g class="node n6">
      <rect x="1046" y="385" width="200" height="130" rx="12"
            fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.6"/>
      <text x="1146" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">6. Coder loop</text>
      <text x="1146" y="421" text-anchor="middle" font-size="10" fill="#bfdbfe">Alex · per subtask</text>

      <g font-size="9.5">
        <rect x="1058" y="432" width="80" height="22" rx="11" fill="#3b4b8a"/>
        <text x="1098" y="446" text-anchor="middle" fill="#e0e7ff">load</text>

        <line x1="1140" y1="443" x2="1156" y2="443" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow)"/>

        <rect x="1158" y="432" width="76" height="22" rx="11" fill="#3b4b8a"/>
        <text x="1196" y="446" text-anchor="middle" fill="#e0e7ff">run</text>
      </g>

      <!-- retry arc inside coder -->
      <path d="M 1234 458 C 1255 478, 1040 478, 1058 458" fill="none" stroke="#f87171" stroke-width="1.4"
            stroke-dasharray="5 3" marker-end="url(#arrowLoop)">
        <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.4s" repeatCount="indefinite"/>
      </path>
      <text x="1146" y="500" text-anchor="middle" font-size="10" fill="#fca5a5">retry ≤ 3 · auto-continue 3 s</text>
    </g>

    <!-- =============== 7. ALL SUBTASKS DONE? =============== -->
    <g class="node n7">
      <polygon points="918,402 998,450 918,498 838,450"
               fill="#78350f" stroke="#fbbf24" stroke-width="1.8"/>
      <text x="918" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#fef3c7">7. All done?</text>
    </g>
    <!-- "no" arrow loops back to coder loop -->
    <path d="M 918 402 C 980 360, 1146 360, 1146 385" fill="none" stroke="#f87171" stroke-width="1.5"
          stroke-dasharray="6 3" marker-end="url(#arrowLoop)">
      <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <text x="1030" y="358" font-size="10.5" fill="#fca5a5" font-weight="600">no</text>

    <!-- =============== 8. QA LOOP =============== -->
    <g class="node n8">
      <rect x="594" y="385" width="246" height="130" rx="12"
            fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.6"/>
      <text x="717" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">8. AI QA loop</text>
      <text x="717" y="421" text-anchor="middle" font-size="10" fill="#bfdbfe">Morgan ↔ Riley · ≤ 10 iter</text>

      <g font-size="10">
        <rect x="608" y="430" width="86" height="34" rx="6" fill="#3b4b8a"/>
        <text x="651" y="445" text-anchor="middle" fill="#e0e7ff" font-weight="700">Reviewer</text>
        <text x="651" y="458" text-anchor="middle" fill="#bfdbfe" font-size="9">qa_reviewer.md</text>

        <line x1="694" y1="447" x2="714" y2="447" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow)"/>

        <polygon points="718,447 740,432 762,447 740,462" fill="#78350f" stroke="#fbbf24" stroke-width="1.3"/>
        <text x="740" y="450" text-anchor="middle" fill="#fef3c7" font-size="9">ok?</text>

        <line x1="766" y1="447" x2="786" y2="447" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow)"/>
        <text x="800" y="450" font-size="9" fill="#a7f3d0">yes →</text>

        <rect x="608" y="478" width="86" height="30" rx="6" fill="#3b4b8a"/>
        <text x="651" y="494" text-anchor="middle" fill="#e0e7ff" font-weight="700">Fixer</text>
        <text x="651" y="504" text-anchor="middle" fill="#bfdbfe" font-size="9">qa_fixer.md</text>

        <!-- rejected → fixer -->
        <path d="M 740 462 L 740 490 L 696 490" fill="none" stroke="#f87171" stroke-width="1.3"
              stroke-dasharray="5 3" marker-end="url(#arrowLoop)">
          <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <text x="745" y="478" font-size="9" fill="#fca5a5">no</text>

        <!-- fixer back to reviewer -->
        <path d="M 608 493 L 588 493 L 588 447 L 606 447" fill="none" stroke="#f87171" stroke-width="1.3"
              stroke-dasharray="5 3" marker-end="url(#arrowLoop)">
          <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>

    <!-- =============== 9. HUMAN REVIEW & MERGE =============== -->
    <g class="node n9 pulse">
      <polygon points="294,398 370,450 294,502 220,450"
               fill="#4c1d95" stroke="#a78bfa" stroke-width="1.8"/>
      <text x="294" y="445" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ede9fe">9. Review &amp; merge</text>
      <text x="294" y="461" text-anchor="middle" font-size="10" fill="#ddd6fe">human gate</text>
      <text x="294" y="476" text-anchor="middle" font-size="9.5" fill="#c4b5fd">review · merge · discard</text>
    </g>

    <!-- =============== 10. DONE =============== -->
    <g class="node n10">
      <circle cx="110" cy="450" r="34" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
      <text x="110" y="455" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">DONE</text>
      <!-- pulse ring -->
      <circle cx="110" cy="450" r="34" fill="none" stroke="#34d399" stroke-width="2">
        <animate attributeName="r" from="34" to="48" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="0.55" to="0" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

  </svg>
</main>

</body>
</html>
