version: "3.9"

# Bridge-mode compose used INSTEAD of the upstream macvlan one.
# Targets a Linux server that's on wireless (where macvlan won't work)
# and that also runs k3s. We publish port 3101 on the host instead of
# claiming a LAN IP.

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: magesticai
    restart: unless-stopped
    ports:
      - "3101:3101"
    volumes:
      - /home/saya/magestic-data:/home/magesticai/.magestic-ai
      - /home/saya/projects:/home/magesticai/projects:rw
      # Persist the Claude config (credentials.json + session state) across
      # container restarts. Without this, every restart wipes the refreshed
      # OAuth tokens — and Anthropic rotates refresh tokens on each use,
      # so re-seeding from a stale CLAUDE_CODE_OAUTH_REFRESH_TOKEN env var
      # will fail with 401. Named volume avoids host UID/permission issues
      # (Docker creates the volume with the right ownership for the
      # container user on first start).
      - magesticai-claude-config:/home/magesticai/.claude
      # Seed file (read-only) for the very first start when the named
      # volume above is empty. UID 1000 on host → only readable by root in
      # the container, but the env-var bootstrap covers the common case.
      - /home/saya/.claude/.credentials.json:/home/magesticai/.claude-seed.json:ro
    cap_add:
      - NET_ADMIN
    # Loaded by ABSOLUTE path so secrets reach the container on ANY deploy
    # method — including a bare `docker compose up` from any cwd that never
    # sourced /home/saya/.aiorch-secrets (compose's auto-loaded `.env` is
    # cwd-dependent and kept getting missed, which blanked GEMINI_API_KEY and
    # broke Hermes). This file is `KEY=VAL` (no `export`); keep it in sync via
    #   sed 's/^export //' /home/saya/.aiorch-secrets > /home/saya/.aiorch.env
    # NOTE: vars also listed under `environment:` below are overridden by it,
    # so only keys absent there (e.g. GEMINI_API_KEY) are sourced from here.
    env_file:
      - /home/saya/.aiorch.env
    environment:
      - APP_DEBUG=false
      - CONTAINER_LAN_FIREWALL=false
      - CONTAINER_GATEWAY=192.168.88.1
      - APP_CORS_ORIGINS=["http://192.168.88.55:3101","http://192.168.88.220:3101","http://localhost:3101"]
      # GEMINI_API_KEY intentionally NOT listed here — it comes from the
      # absolute-path env_file above so it survives deploys that don't source
      # secrets. Listing it here as ${GEMINI_API_KEY:-} would override that
      # with an empty string. (It's a static key, safe to source from a file.)
      # Claude Code OAuth token (from host's /home/saya/.claude/.credentials.json,
      # exported via /home/saya/.aiorch-secrets). Authorizes against the user's
      # Anthropic subscription (Max), not API credits.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Refresh token is needed for claude_token_service to keep the access
      # token alive across the ~1-hour Max OAuth expiry. Extract it from
      # /home/saya/.claude/.credentials.json (see .ops/scripts/refresh_secrets.py).
      - CLAUDE_CODE_OAUTH_REFRESH_TOKEN=${CLAUDE_CODE_OAUTH_REFRESH_TOKEN:-}
      # Graphiti memory: cross-session knowledge graph the agent writes to as
      # it learns about the codebase. Off by default — flip to `true` in
      # /home/saya/.aiorch-secrets to enable. Reuses the same Anthropic /
      # Gemini keys for entity extraction, so no extra config needed.
      - GRAPHITI_ENABLED=${GRAPHITI_ENABLED:-false}
      - GRAPHITI_LLM_PROVIDER=${GRAPHITI_LLM_PROVIDER:-anthropic}
      - GRAPHITI_EMBEDDER_PROVIDER=${GRAPHITI_EMBEDDER_PROVIDER:-google}
      # CodeGraphContext: code-structure graph for agents + docs panel. CGC lives
      # in a venv on the persisted .magestic-ai volume; point the resolver at it.
      - CODEGRAPH_BIN=/home/magesticai/.magestic-ai/tools/cgc-venv/bin/codegraphcontext
      # Git provider credentials. Add the ones you use to /home/saya/.aiorch-secrets.
      # gh CLI auto-detects GH_TOKEN; git uses them via the credential helper
      # configured at container entrypoint.
      # Bitbucket supports both Cloud (bitbucket.org + USERNAME + APP_PASSWORD)
      # and Server (custom HOST + HTTP access TOKEN). Leave HOST unset for Cloud.
      - GH_TOKEN=${GH_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - BITBUCKET_HOST=${BITBUCKET_HOST:-}
      - BITBUCKET_USERNAME=${BITBUCKET_USERNAME:-}
      - BITBUCKET_TOKEN=${BITBUCKET_TOKEN:-}
      - BITBUCKET_APP_PASSWORD=${BITBUCKET_APP_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    tmpfs:
      - /tmp:size=500M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  magesticai-claude-config:
    name: magesticai-claude-config
